<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://script.google.com; media-src 'self' data: blob:;">
    <title>Reset Password - Biology Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Exact same styling as your log_in.html */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: url('web_assets/background_imagee.png') no-repeat center center/cover; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; background-color: rgba(26, 67, 33, 0.05); }
        .left-section { flex: 1.2; display: flex; align-items: flex-end; justify-content: center; position: relative; }
        .teacher-img { height: 105vh; margin-bottom: -5vh; margin-left: -100px; width: auto; object-fit: contain; filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.6)); opacity: 0; animation: slideInLeft 1s ease-out forwards; }
        .right-section { flex: 1; display: flex; align-items: center; justify-content: flex-start; padding-right: 8%; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.9); padding: 50px 40px; border-radius: 24px; width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15); opacity: 0; animation: slideInRight 1s ease-out forwards; }
        h2 { color: #1a4321; margin-bottom: 10px; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { color: #555; font-size: 14px; margin-bottom: 35px; font-weight: 400; }
        .input-box { position: relative; width: 100%; height: 60px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.6); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.5); transition: all 0.3s ease; }
        .input-box:focus-within { background: rgba(255, 255, 255, 0.95); border: 1px solid #1a4321; box-shadow: 0 4px 15px rgba(26, 67, 33, 0.1); }
        .input-box input { width: 100%; height: 100%; background: transparent; border: none; outline: none; font-size: 16px; color: #1a4321; font-weight: 500; padding: 25px 50px 5px 20px; }
        .input-box label { position: absolute; top: 50%; left: 20px; transform: translateY(-50%); font-size: 15px; color: #666; pointer-events: none; transition: .3s ease-out; }
        .input-box input:focus ~ label, .input-box input:valid ~ label { top: 12px; font-size: 11px; color: #1a4321; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .mission-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4a017 0%, #b88a14 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(212, 160, 23, 0.2); letter-spacing: 1px; }
        .mission-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(212, 160, 23, 0.4); }
        .mission-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Toast CSS */
        .toast { position: fixed; bottom: 30px; right: 30px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-left: 5px solid #1a4321; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); padding: 16px 24px; display: flex; align-items: center; gap: 20px; z-index: 9999; transform: translateX(150%); transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left: 5px solid #d4a017; }
        #toast-message { color: #1a4321; font-size: 14px; font-weight: 500; }
        #toast-close { background: none; border: none; font-size: 24px; color: #666; cursor: pointer; line-height: 1; transition: color 0.3s; }
        #toast-close:hover { color: #1a4321; }
        
        @media (max-width: 900px) { .main-wrapper { flex-direction: column; } .left-section { display: none; } .right-section { padding-right: 0; justify-content: center; width: 100%; } .glass-card { width: 90%; padding: 30px; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="left-section">
            <img src="web_assets/Teacher_image-1.png" alt="Teacher" class="teacher-img">
        </div>
        <div class="right-section">
            <div class="glass-card">
                <h2>Reset Password</h2>
                <p class="subtitle">Enter your new secure password</p>
                <form id="reset-form">
                    <div class="input-box">
                        <input type="password" id="new-password" required minlength="6">
                        <label>New Password</label>
                    </div>
                    <button type="submit" class="mission-btn" id="update-btn">UPDATE PASSWORD</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-notification" class="toast">
        <span id="toast-message">Message goes here</span>
        <button id="toast-close" onclick="closeToast()">&times;</button>
    </div>

    <script>
        const AUTH_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxryOSSf3t4oUMhNW-UJKS5lq69kJ6LDD5fjJe-cZ8eqis0Tf2o3gehON0AzAuqlcNlcw/exec';
        
        // Grab token from URL bar (e.g. site.com/reset.html?token=abcd)
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');

        let toastTimeout;
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast-notification');
            document.getElementById('toast-message').innerText = message;
            isError ? toast.classList.add('error') : toast.classList.remove('error');
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(closeToast, 5000);
        }
        function closeToast() { document.getElementById('toast-notification').classList.remove('show'); }

        // Boot user out immediately if they arrived without a token
        if (!urlToken) {
            showToast("Invalid reset link. Redirecting to login...", true);
            setTimeout(() => { window.location.href = "log_in.html"; }, 3000);
        }

        document.getElementById('reset-form').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('update-btn');
            btn.innerText = "UPDATING...";
            btn.disabled = true;

            const newPass = document.getElementById('new-password').value;

            fetch(AUTH_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "reset_password", 
                    token: urlToken,
                    newPassword: newPass
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    showToast("Password updated successfully! Redirecting...");
                    setTimeout(() => { window.location.href = "log_in.html"; }, 2500);
                } else {
                    showToast("Error: " + data.message, true);
                    btn.innerText = "UPDATE PASSWORD";
                    btn.disabled = false;
                }
            })
            .catch(() => {
                showToast("Connection Error. Check your internet.", true);
                btn.innerText = "UPDATE PASSWORD";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
